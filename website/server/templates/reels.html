<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reels</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: black;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .reels-container {
            height: 100dvh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .reels-container::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .reels-container {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .reel {
            height: 100dvh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reel-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .reel-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.4) 100%);
            z-index: 2;
        }

        .reel-content {
            position: absolute;
            bottom: 50px;
            left: 20px;
            right: 80px;
            z-index: 3;
            color: white;
            text-shadow: 
                -1px -1px 0 rgba(0,0,0,0.8),
                 1px -1px 0 rgba(0,0,0,0.8),
                -1px  1px 0 rgba(0,0,0,0.8),
                 1px  1px 0 rgba(0,0,0,0.8),
                 0px  2px 5px rgba(0,0,0,0.9);
        }

        .reel-text {
            font-size: 1.2rem;
            line-height: 1.4;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .reel-id {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .interactions {
            position: absolute;
            bottom: 50px;
            right: 20px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .action-button {
            width: 45px;
            height: 45px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
            text-decoration: none;
        }

        .play-prompt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.8);
            color: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .play-prompt h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .play-prompt p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        .action-button.liked {
            color: #ff2d55;
            background-color: rgba(255, 45, 85, 0.2);
        }

        .action-button:hover {
            transform: scale(1.1);
            background-color: rgba(255, 255, 255, 0.4);
        }

        .action-button:active {
            transform: scale(0.9);
            background-color: rgba(255, 255, 255, 0.1);
        }

        .heart-animation {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 100px;
            color: white;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes heart-burst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .animate-heart {
            animation: heart-burst 0.8s ease-out forwards;
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            color: rgba(255, 255, 255, 0.4);
            z-index: 15;
            pointer-events: none;
            display: none;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        .play-overlay svg {
            width: 100%;
            height: 100%;
        }

        .record-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .record-modal {
            background: #1e293b;
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .record-modal h3 {
            margin-top: 0;
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
        }

        .record-modal textarea {
            width: 100%;
            height: 100px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-family: inherit;
            font-size: 1.1rem;
            margin: 20px 0;
            resize: none;
            box-sizing: border-box;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
        }

        .modal-button {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .modal-button:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        .modal-button:active {
            transform: translateY(0) scale(0.98);
        }

        .button-confirm {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
        }

        .button-exit {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .button-replay {
            background: rgba(255,255,255,0.1);
            color: white;
            margin-bottom: 20px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .action-button.recording {
            background-color: #ff2d55;
            animation: pulse-red 1s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 45, 85, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 45, 85, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 45, 85, 0); }
        }

        .top-search-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
        }

        .autocomplete {
            position: relative;
            display: block;
        }

        #reelsSearch {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 12px 20px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #reelsSearch:focus {
            background: rgba(0, 0, 0, 0.8);
            border-color: rgba(255,255,255,0.5);
        }

        .suggestions {
            position: absolute;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            top: calc(100% + 5px);
            left: 0;
            padding: 5px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
        }

        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            border-radius: 8px;
            color: white;
            transition: background 0.2s;
            text-decoration: none;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .suggestion-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <audio id="mainAudio" playsinline style="display: none;"></audio>
    <div id="playPrompt" class="play-prompt">
        <h1>Tap to Start</h1>
        <p>Enable autoplay</p>
    </div>

    <div class="top-search-bar" id="topSearchBar" style="display: none;">
        <div class="autocomplete">
            <input type="text" id="reelsSearch" placeholder="Cauta vorbe (minim 2 litere)..." autocomplete="off">
            <div id="searchSuggestions" class="suggestions"></div>
        </div>
    </div>

    <div class="reels-container" id="reelsContainer" style="display: none;">
        {% for sentence in sentences %}
        <div class="reel" data-audio-src="/audio/{{ sentence.id }}" data-id="{{ sentence.id }}">
            <div class="heart-animation">❤️</div>
            <div class="play-overlay">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19.045 10.299L8.3 4.192C6.913 3.411 5.143 4.414 5.143 6.004V17.996C5.143 19.586 6.913 20.589 8.3 19.808L19.045 13.701C20.318 12.981 20.318 11.019 19.045 10.299Z" />
                </svg>
            </div>
            <!-- Generate image using Lorem Picsum based on sentence text for reliable, unique loading -->
            <img src="https://picsum.photos/seed/{{ sentence.text | urlencode }}/1080/1920" alt="Generated context" class="reel-bg" loading="lazy">
            <div class="reel-overlay"></div>
            
            <div class="reel-content">
                <div class="reel-id">@sentence_{{ sentence.id }}</div>
                <div class="reel-text">{{ sentence.text }}</div>
            </div>

            <div class="interactions">
                <div class="action-button add-button" title="Add Custom Sentence">
                    ➕
                </div>
                <div class="action-button like-button" title="Like" data-id="{{ sentence.id }}">
                   ❤️
                </div>
                <a class="action-button" href="/sentence/{{ sentence.id }}" title="View Details">
                   ℹ️ 
                </a>
            </div>
        </div>
        {% endfor %}
    </div>

    <div id="recordOverlay" class="record-overlay">
        <div class="record-modal">
            <h3>Verifică Vorba</h3>
            <button id="replayBtn" class="modal-button button-replay">🔊 Reascultă</button>
            <textarea id="recordText" placeholder="Textul interpretat va apărea aici..."></textarea>
            <div class="modal-actions">
                <button id="exitBtn" class="modal-button button-exit">Ieși</button>
                <button id="uploadBtn" class="modal-button button-confirm">Încarcă</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playPrompt = document.getElementById('playPrompt');
            const reelsContainer = document.getElementById('reelsContainer');
            let reels = document.querySelectorAll('.reel');
            let isStarted = false;

            const audioPlayer = document.getElementById('mainAudio');
            
            let currentReelIndex = 0;
            let currentAudioSrc = null;
            let reelStartTime = Date.now();
            let hasInteractedAtCurrentReel = false;
            let observer = null;
            
            audioPlayer.addEventListener('ended', () => {
                const currentId = reels[currentReelIndex].getAttribute('data-id');
                hasInteractedAtCurrentReel = true; 
                if (!document.querySelector(`.like-button[data-id="${currentId}"]`).classList.contains('liked')) {
                    recordAction(currentId, 'like');
                }
                
                if (currentReelIndex < reels.length - 1) {
                    reels[currentReelIndex + 1].scrollIntoView({ behavior: 'smooth' });
                }
            });

            audioPlayer.addEventListener('play', () => {
                document.querySelectorAll('.play-overlay').forEach(el => el.style.display = 'none');
            });

            audioPlayer.addEventListener('pause', () => {
                if (isStarted && !audioPlayer.ended) {
                    const currentReel = reels[currentReelIndex];
                    if (currentReel) {
                        currentReel.querySelector('.play-overlay').style.display = 'block';
                    }
                }
            });

            function recordAction(id, type) {
                fetch(`/${type}/${id}`, { method: 'POST' });
            }

            function playAudioForReel(index) {
                if (index < 0 || index >= reels.length) return;
                
                if (currentReelIndex !== index) {
                    const timeSpent = (Date.now() - reelStartTime) / 1000;
                    const prevReelId = reels[currentReelIndex].getAttribute('data-id');
                    if (timeSpent < 3 && !hasInteractedAtCurrentReel) {
                        recordAction(prevReelId, 'unlike');
                    }
                }

                currentReelIndex = index;
                reelStartTime = Date.now();
                hasInteractedAtCurrentReel = false;

                const reel = reels[index];
                const audioSrc = reel.getAttribute('data-audio-src');
                
                if (currentAudioSrc !== audioSrc) {
                    currentAudioSrc = audioSrc;
                    audioPlayer.src = audioSrc;
                    audioPlayer.currentTime = 0;
                    audioPlayer.play().catch(e => console.log('Autoplay blocked:', e));
                } else if (audioPlayer.paused) {
                    audioPlayer.play().catch(e => console.log('Autoplay blocked:', e));
                }
            }

            playPrompt.addEventListener('click', () => {
                if (isStarted) return;
                isStarted = true;
                playPrompt.style.display = 'none';
                reelsContainer.style.display = 'block';
                document.getElementById('topSearchBar').style.display = 'block';
                
                if (reels.length > 0) {
                    currentReelIndex = 0;
                    reelStartTime = Date.now();
                    const audioSrc = reels[0].getAttribute('data-audio-src');
                    currentAudioSrc = audioSrc;
                    audioPlayer.src = audioSrc;
                    audioPlayer.load();
                    audioPlayer.play().catch(e => console.log('Autoplay blocked:', e));
                }
                
                initObserver();
            });

            function initObserver() {
                const observerOptions = {
                    root: reelsContainer,
                    rootMargin: '0px',
                    threshold: 0.6 
                };

                observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const reel = entry.target;
                            const index = Array.from(reels).indexOf(reel);
                            playAudioForReel(index);
                        } 
                    });
                }, observerOptions);

                reels.forEach(reel => {
                    observer.observe(reel);
                });
            }
            
            function setupReelEvents(reel) {
                const likeBtn = reel.querySelector('.like-button');
                likeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = likeBtn.getAttribute('data-id');
                    likeBtn.classList.toggle('liked');
                    if (likeBtn.classList.contains('liked')) {
                        recordAction(id, 'like');
                        hasInteractedAtCurrentReel = true;
                    }
                });

                let lastTap = 0;
                reel.addEventListener('click', (e) => {
                    if(e.target.closest('.action-button')) return;
                    if(dragDistance > 10) return;
                    
                    const now = Date.now();
                    const id = reel.getAttribute('data-id');
                    
                    if (now - lastTap < 300) {
                        if (!likeBtn.classList.contains('liked')) {
                            likeBtn.classList.add('liked');
                            recordAction(id, 'like');
                        }
                        hasInteractedAtCurrentReel = true;
                        
                        const heart = reel.querySelector('.heart-animation');
                        heart.classList.remove('animate-heart');
                        void heart.offsetWidth; 
                        heart.classList.add('animate-heart');
                    } else {
                        setTimeout(() => {
                            if (Date.now() - lastTap >= 300) {
                                if (Array.from(reels).indexOf(reel) === currentReelIndex) {
                                    if(audioPlayer.paused) {
                                        audioPlayer.play();
                                    } else {
                                        audioPlayer.pause();
                                    }
                                }
                            }
                        }, 300);
                    }
                    lastTap = now;
                });
            }

            reels.forEach(setupReelEvents);

            // Custom Recording Logic
            let mediaRecorder;
            let audioChunks = [];
            let recognition;
            let recordedBlob;

            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRec) {
                console.log("Speech Recognition initialized successfully.");
                recognition = new SpeechRec();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'ro-RO';
            } else {
                console.log("CRITICAL: Speech Recognition is NOT supported in this browser.");
            }

            const recordOverlay = document.getElementById('recordOverlay');
            const recordText = document.getElementById('recordText');
            const replayBtn = document.getElementById('replayBtn');
            const uploadBtn = document.getElementById('uploadBtn');
            const exitBtn = document.getElementById('exitBtn');

            async function startRecording(btn) {
                audioChunks = [];
                btn.classList.add('recording');
                btn.innerText = '🎤';
                console.log("Start recording attempt...");
                
                if (audioPlayer) audioPlayer.pause();
                reelsContainer.style.overflowY = 'hidden';

                try {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error("Suportul pentru microfon lipsește în acest browser.");
                    }

                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
                    mediaRecorder = new MediaRecorder(stream, { mimeType });
                    
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) audioChunks.push(e.data);
                    };
                    
                    mediaRecorder.onstop = () => {
                        recordedBlob = new Blob(audioChunks, { type: mimeType });
                        console.log("Recording stopped. MimeType:", mimeType, "Blob size:", recordedBlob.size);
                    };
                    
                    mediaRecorder.start();
                    console.log("MediaRecorder started with format:", mimeType);
                    
                    if (recognition) {
                        recordText.value = "";
                        recognition.onstart = () => console.log("Speech Recognition: Session started");
                        recognition.onaudiostart = () => console.log("Speech Recognition: Audio capture started");
                        recognition.onspeechstart = () => console.log("Speech Recognition: User is speaking...");
                        recognition.onresult = (event) => {
                            let result = "";
                            for (let i = 0; i < event.results.length; ++i) {
                                result += event.results[i][0].transcript;
                            }
                            console.log("Live transcription result:", result);
                            recordText.value = result;
                        };
                        recognition.onerror = (e) => console.log("Speech Recognition ERROR:", e.error);
                        recognition.onend = () => console.log("Speech Recognition: Session ended");
                        try { recognition.start(); } catch(e) { console.log("Recognition start CATCH error:", e); }
                    } else {
                        console.log("Speech recognition not supported in this browser.");
                    }
                } catch (err) {
                    console.error("Recording error:", err);
                    alert("Eroare la pornirea microfonului: " + err.message);
                    btn.classList.remove('recording');
                    reelsContainer.style.overflowY = 'scroll';
                }
            }

            function stopRecording(btn) {
                console.log("Stop recording called");
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                    if (recognition) {
                        try { recognition.stop(); } catch(e) {}
                    }
                    
                    btn.classList.remove('recording');
                    btn.innerText = '➕';
                    setTimeout(() => {
                        recordOverlay.style.display = 'flex';
                    }, 500);
                } else {
                    btn.classList.remove('recording');
                    btn.innerText = '➕';
                    reelsContainer.style.overflowY = 'scroll';
                }
            }

            document.querySelectorAll('.add-button').forEach(btn => {
                btn.addEventListener('mousedown', () => startRecording(btn));
                btn.addEventListener('mouseup', () => stopRecording(btn));
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    startRecording(btn);
                });
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    stopRecording(btn);
                });
            });

            replayBtn.addEventListener('click', () => {
                const status = recordedBlob ? `${recordedBlob.size} bytes (${recordedBlob.type})` : "null";
                console.log("Replay attempt. Blob:", status);
                
                if (recordedBlob) {
                    try {
                        const audioUrl = URL.createObjectURL(recordedBlob);
                        const testAudio = new Audio();
                        testAudio.src = audioUrl;
                        
                        testAudio.onloadstart = () => console.log("Audio load started...");
                        testAudio.onplay = () => console.log("Audio play event fired!");
                        testAudio.oncanplaythrough = () => console.log("Audio ready (canplaythrough)");

                        testAudio.onerror = (e) => {
                            console.error("Audio Load Error:", testAudio.error);
                        };

                        console.log("Forcing play immediate...");
                        testAudio.play().then(() => {
                            console.log("Play promise resolved successfully");
                        }).catch(err => {
                            console.error("Play promise rejected:", err);
                        });
                    } catch (e) {
                        console.error("Critical Replay Error:", e);
                    }
                } else {
                    alert("Nu s-a detectat nicio înregistrare validă.");
                }
            });

            exitBtn.addEventListener('click', () => {
                recordOverlay.style.display = 'none';
                reelsContainer.style.overflowY = 'scroll';
                recordText.value = "";
                recordedBlob = null;
            });

            uploadBtn.addEventListener('click', async () => {
                if (!recordText.value || !recordedBlob) return;
                
                uploadBtn.disabled = true;
                uploadBtn.innerText = "Se încarcă...";

                const formData = new FormData();
                formData.append('text', recordText.value);
                formData.append('audio', recordedBlob, 'audio.mp3');

                try {
                    const response = await fetch('/api/upload_sentence', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (data.id) {
                        recordOverlay.style.display = 'none';
                        reelsContainer.style.overflowY = 'scroll';
                        // Add to current UI and scroll to it
                        insertAndScrollToReel({
                            id: data.id,
                            text: data.text
                        });
                        recordText.value = "";
                        recordedBlob = null;
                    }
                } catch (err) {
                    console.error("Upload failed:", err);
                } finally {
                    uploadBtn.disabled = false;
                    uploadBtn.innerText = "Încarcă";
                }
            });

            // Add drag to scroll functionality
            let isDragging = false;
            let startY;
            let startScrollTop;
            let dragDistance = 0;

            reelsContainer.addEventListener('mousedown', (e) => {
                isDragging = true;
                dragDistance = 0;
                startY = e.pageY;
                startScrollTop = reelsContainer.scrollTop;
                reelsContainer.style.scrollSnapType = 'none';
                reelsContainer.style.scrollBehavior = 'auto'; 
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault(); 
                const y = e.pageY;
                const walk = y - startY;
                dragDistance += Math.abs(e.movementY);
                reelsContainer.scrollTop = startScrollTop - walk;
            });

            window.addEventListener('mouseup', () => {
                if (!isDragging) return;
                isDragging = false;
                reelsContainer.style.scrollSnapType = 'y mandatory';
                reelsContainer.style.scrollBehavior = 'smooth';
                
                if (dragDistance > 10) {
                    const snapHeight = window.innerHeight;
                    const currentScroll = reelsContainer.scrollTop;
                    const closestIndex = Math.round(currentScroll / snapHeight);
                    reelsContainer.scrollTo({
                        top: closestIndex * snapHeight,
                        behavior: 'smooth'
                    });
                }
            });

            function insertAndScrollToReel(sentence) {
                const newReel = document.createElement('div');
                newReel.className = 'reel';
                newReel.setAttribute('data-audio-src', '/audio/' + sentence.id);
                newReel.setAttribute('data-id', sentence.id);
                
                const encodedText = encodeURIComponent(sentence.text);
                
                newReel.innerHTML = `
                    <div class="heart-animation">❤️</div>
                    <div class="play-overlay">
                        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19.045 10.299L8.3 4.192C6.913 3.411 5.143 4.414 5.143 6.004V17.996C5.143 19.586 6.913 20.589 8.3 19.808L19.045 13.701C20.318 12.981 20.318 11.019 19.045 10.299Z" />
                        </svg>
                    </div>
                    <img src="https://picsum.photos/seed/${encodedText}/1080/1920" alt="Generated context" class="reel-bg" loading="lazy">
                    <div class="reel-overlay"></div>
                    
                    <div class="reel-content">
                        <div class="reel-id">@sentence_${sentence.id}</div>
                        <div class="reel-text">${sentence.text}</div>
                    </div>

                    <div class="interactions">
                        <div class="action-button add-button" title="Add Custom Sentence">
                            ➕
                        </div>
                        <div class="action-button like-button" title="Like" data-id="${sentence.id}">
                           ❤️
                        </div>
                        <a class="action-button" href="/sentence/${sentence.id}" title="View Details">
                           ℹ️ 
                        </a>
                    </div>
                `;

                const currentReel = reels[currentReelIndex];
                currentReel.insertAdjacentElement('afterend', newReel);

                reels = document.querySelectorAll('.reel');
                
                if (observer) {
                    observer.observe(newReel);
                }
                
                // Set up events for the new record button
                const newAddBtn = newReel.querySelector('.add-button');
                newAddBtn.addEventListener('mousedown', () => startRecording(newAddBtn));
                newAddBtn.addEventListener('mouseup', () => stopRecording(newAddBtn));
                newAddBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    startRecording(newAddBtn);
                });
                newAddBtn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    stopRecording(newAddBtn);
                });

                setupReelEvents(newReel);

                newReel.scrollIntoView({ behavior: 'smooth' });
            }

            // Search functionality
            const searchInput = document.getElementById('reelsSearch');
            const suggestionsBox = document.getElementById('searchSuggestions');
            let searchDebounceTimer;

            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchDebounceTimer);
                const query = e.target.value.trim();
                
                if (query.length < 2) {
                    suggestionsBox.style.display = 'none';
                    return;
                }

                searchDebounceTimer = setTimeout(async () => {
                    try {
                        const response = await fetch('/api/suggest?q=' + encodeURIComponent(query));
                        const data = await response.json();
                        
                        if (data.suggestions && data.suggestions.length > 0) {
                            suggestionsBox.innerHTML = data.suggestions.map(s => 
                                `<div class="suggestion-item" data-id="${s.id}" data-text="${s.text.replace(/"/g, '&quot;')}">${s.text}</div>`
                            ).join('');
                            suggestionsBox.style.display = 'block';

                            suggestionsBox.querySelectorAll('.suggestion-item').forEach(item => {
                                item.addEventListener('click', () => {
                                    insertAndScrollToReel({
                                        id: item.getAttribute('data-id'),
                                        text: item.getAttribute('data-text')
                                    });
                                    suggestionsBox.style.display = 'none';
                                    searchInput.value = '';
                                });
                            });
                        } else {
                            suggestionsBox.style.display = 'none';
                        }
                    } catch (error) {
                        console.error('Failed to fetch suggestions:', error);
                    }
                }, 300);
            });

            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                    suggestionsBox.style.display = 'none';
                }
            });
            
            searchInput.addEventListener('focus', () => {
                if (searchInput.value.trim().length >= 2 && suggestionsBox.innerHTML.trim() !== '') {
                    suggestionsBox.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
