<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dak te enerveaza un fraier</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
        }

        .container {
            max-width: 800px;
            width: 90%;
            margin-top: 80px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .generator-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.85rem;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px 20px;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result-box {
            margin-top: 40px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            border-left: 4px solid var(--primary);
            animation: fadeIn 0.5s ease-out;
        }

        .result-title {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .result-content {
            font-size: 1.5rem;
            line-height: 1.4;
            font-family: 'Outfit', sans-serif;
            font-style: italic;
        }

        .nav-links {
            margin-top: 30px;
            text-align: center;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            margin: 0 15px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Subtle Loader Effect */
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .dots {
            font-size: 2rem;
            animation: blink 1.4s infinite reverse;
        }

        @keyframes blink {
            0% {
                opacity: .2;
            }

            20% {
                opacity: 1;
            }

            100% {
                opacity: .2;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Dak te enerveaza un fraier</h1>
            <p class="description">Si vrei sa-l injuri da si sa te duci la pacanele</p>
        </div>

        <div class="generator-card">
            <form method="POST" onsubmit="document.getElementById('loader').style.display='block';">
                <div class="form-group">
                    <label for="keywords">Zi la ratat de: </label>
                    <input type="text" id="keywords" name="keywords" placeholder="Ex: scoala, coleg, minge..."
                        value="{{ keywords }}" required autocomplete="off">
                </div>
                <button type="submit">Generează Magie</button>
            </form>

            <div id="loader" class="loading">
                <div class="dots">...</div>
                <p>Se coc cuvintele...</p>
            </div>

            {% if output %}
            <div class="result-box" style="display: block;">
                <div class="result-title">Muieste-l cu asta:</div>
                <div class="result-content">"{{ output }}"</div>
            </div>
            {% endif %}
        </div>

        <div class="nav-links">
            <a href="/">← Înapoi la Start</a>
            <a href="/chat">Chat Liber</a>
            <a href="/vectorsearch">Căutare Vectorială</a>
        </div>
    </div>
</body>

</html>
