<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reels</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: black;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .reels-container {
            height: 100dvh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .reels-container::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .reels-container {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .reel {
            height: 100dvh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reel-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .reel-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.4) 100%);
            z-index: 2;
        }

        .reel-content {
            position: absolute;
            bottom: 50px;
            left: 20px;
            right: 80px;
            z-index: 3;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .reel-text {
            font-size: 1.2rem;
            line-height: 1.4;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .reel-id {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .interactions {
            position: absolute;
            bottom: 50px;
            right: 20px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .action-button {
            width: 45px;
            height: 45px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
            text-decoration: none;
        }

        .play-prompt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.8);
            color: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .play-prompt h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .play-prompt p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="playPrompt" class="play-prompt">
        <h1>Tap to Start</h1>
        <p>Enable autoplay</p>
    </div>

    <div class="reels-container" id="reelsContainer" style="display: none;">
        {% for sentence in sentences %}
        <div class="reel" data-audio-src="/audio/{{ sentence.id }}">
            <!-- Generate image using Lorem Picsum based on sentence text for reliable, unique loading -->
            <img src="https://picsum.photos/seed/{{ sentence.text | urlencode }}/1080/1920" alt="Generated context" class="reel-bg" loading="lazy">
            <div class="reel-overlay"></div>
            
            <div class="reel-content">
                <div class="reel-id">@sentence_{{ sentence.id }}</div>
                <div class="reel-text">{{ sentence.text }}</div>
            </div>

            <div class="interactions">
                <a class="action-button" href="/sentence/{{ sentence.id }}" title="View Details">
                   ℹ️ 
                </a>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playPrompt = document.getElementById('playPrompt');
            const reelsContainer = document.getElementById('reelsContainer');
            const reels = document.querySelectorAll('.reel');
            let isStarted = false;

            // Global audio player for mobile (iOS explicit unlock)
            const audioPlayer = new Audio();
            audioPlayer.playsInline = true;
            
            let currentReelIndex = 0;
            let currentAudioSrc = null;
            
            // Autonext implementation
            audioPlayer.addEventListener('ended', () => {
                // If there's a next reel, scroll to it smoothly
                if (currentReelIndex < reels.length - 1) {
                    reels[currentReelIndex + 1].scrollIntoView({ behavior: 'smooth' });
                }
            });

            function playAudioForReel(index) {
                if (index < 0 || index >= reels.length) return;
                
                currentReelIndex = index;
                const reel = reels[index];
                const audioSrc = reel.getAttribute('data-audio-src');
                
                if (currentAudioSrc !== audioSrc) {
                    currentAudioSrc = audioSrc;
                    audioPlayer.src = audioSrc;
                    audioPlayer.currentTime = 0;
                }
                
                audioPlayer.play().catch(e => console.log('Autoplay blocked:', e));
            }

            // Start interaction to allow autoplay
            playPrompt.addEventListener('click', () => {
                if (isStarted) return;
                isStarted = true;
                playPrompt.style.display = 'none';
                reelsContainer.style.display = 'block';
                
                // Start playing the first sound immediately during the click event to unlock iOS audio
                playAudioForReel(0);
                
                // Initialize observer only after user interaction
                initObserver();
            });

            function initObserver() {
                const observerOptions = {
                    root: reelsContainer,
                    rootMargin: '0px',
                    threshold: 0.6 // Reel must be 60% visible to trigger
                };

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const reel = entry.target;
                            const index = Array.from(reels).indexOf(reel);
                            playAudioForReel(index);
                        } 
                    });
                }, observerOptions);

                // Observe all reels
                reels.forEach(reel => {
                    observer.observe(reel);
                });
            }
            
            // Allow clicking on a reel to pause/play
            let dragDistance = 0;
            reels.forEach(reel => {
                reel.addEventListener('click', (e) => {
                    // Ignore clicks on buttons
                    if(e.target.closest('.action-button')) return;
                    if(dragDistance > 10) return; // It was a drag, not a click
                    
                    // Only pause/play if this container is the currently active playing one
                    if (Array.from(reels).indexOf(reel) === currentReelIndex) {
                        if(audioPlayer.paused) {
                            audioPlayer.play();
                        } else {
                            audioPlayer.pause();
                        }
                    }
                });
            });

            // Add drag to scroll functionality
            let isDragging = false;
            let startY;
            let startScrollTop;

            reelsContainer.addEventListener('mousedown', (e) => {
                isDragging = true;
                dragDistance = 0;
                startY = e.pageY;
                startScrollTop = reelsContainer.scrollTop;
                reelsContainer.style.scrollSnapType = 'none';
                reelsContainer.style.scrollBehavior = 'auto'; // instant scroll tracking
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault(); // prevent text selection
                const y = e.pageY;
                const walk = y - startY;
                dragDistance += Math.abs(e.movementY);
                reelsContainer.scrollTop = startScrollTop - walk;
            });

            window.addEventListener('mouseup', () => {
                if (!isDragging) return;
                isDragging = false;
                reelsContainer.style.scrollSnapType = 'y mandatory';
                reelsContainer.style.scrollBehavior = 'smooth';
                
                // Force a re-evaluation of snap position by slightly nudging scroll
                // Not always strictly necessary, but helpful for some browser engines
                if (dragDistance > 10) {
                    const snapHeight = window.innerHeight;
                    const currentScroll = reelsContainer.scrollTop;
                    const closestIndex = Math.round(currentScroll / snapHeight);
                    reelsContainer.scrollTo({
                        top: closestIndex * snapHeight,
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
</body>
</html>
